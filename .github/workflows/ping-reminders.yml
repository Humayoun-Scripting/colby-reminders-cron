name: Colby Reminders Clock (backup)

# TERTIARY backup clock only. The PRIMARY clock is the dedicated Vercel cron project
# "colby-reminders-clock" (confirmed firing every 5 min). The booking webhook piggyback
# is the secondary. This GitHub job is a lightweight extra net: short, 2 quick hits,
# no long-running loop (so it never trips Actions abuse limits). Idempotent endpoint.
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}
concurrency:
  group: reminders-clock
  cancel-in-progress: true
jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Ping send-reminders twice
        env:
          URL: ${{ secrets.REMINDERS_PING_URL }}
        run: |
          if [ -z "$URL" ]; then echo "REMINDERS_PING_URL secret missing"; exit 1; fi
          curl -s -o /dev/null -w "hit1 HTTP %{http_code}\n" -m 45 --retry 2 "$URL"
          sleep 60
          curl -s -o /dev/null -w "hit2 HTTP %{http_code}\n" -m 45 --retry 2 "$URL"
